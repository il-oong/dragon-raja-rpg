name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Electron / electron-builder 가 GitHub 에서 받아야 하는 바이너리를 캐싱.
      # 이전 빌드가 한 번 성공하면 이후 빌드에서 504 Gateway 재발 시에도
      # 네트워크 의존 없이 진행 가능. 키에 electron 버전 박아 버전 바뀌면 자동 갱신.
      - name: Cache Electron & electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-ebbin-electron28-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ebbin-electron28-
            ${{ runner.os }}-ebbin-

      - name: Install dependencies (with retry)
        shell: pwsh
        run: |
          $max = 4
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "npm install attempt $i / $max"
            npm install --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) { Write-Host "OK on attempt $i"; exit 0 }
            if ($i -lt $max) {
              $wait = [math]::Pow(2, $i)
              Write-Host "Failed (exit $LASTEXITCODE). Waiting $wait seconds..."
              Start-Sleep -Seconds $wait
            }
          }
          exit 1

      - name: Build & publish to GitHub Releases (with retry)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $max = 4
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "electron-builder attempt $i / $max"
            npm run release
            if ($LASTEXITCODE -eq 0) { Write-Host "OK on attempt $i"; exit 0 }
            if ($i -lt $max) {
              $wait = [math]::Pow(2, $i)
              Write-Host "Failed (exit $LASTEXITCODE). Waiting $wait seconds..."
              Start-Sleep -Seconds $wait
            }
          }
          exit 1

      # electron-builder 는 기본적으로 Draft 로 릴리즈를 만든다 (안전 위해).
      # 자동 업데이트가 동작하려면 Published + Latest 로 승격해야 하므로 마지막에
      # gh CLI 로 draft=false, latest=true 전환. tag 가 없으면 스킵 (방어).
      - name: Promote draft to Latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (node -p "require('./package.json').version")
          $tag = "v$version"
          Write-Host "Promoting $tag to Latest..."
          # 기존 tag 로 생성된 릴리즈를 찾는다. Draft 는 --drafts 필요.
          $existing = gh release list --limit 20 --json tagName,isDraft | ConvertFrom-Json
          $match = $existing | Where-Object { $_.tagName -eq $tag }
          if (-not $match) {
            Write-Error "릴리즈를 찾지 못함: $tag (electron-builder 가 publish 에 실패한 듯)"
            exit 1
          }
          gh release edit $tag --draft=false --latest
          if ($LASTEXITCODE -ne 0) { Write-Error "릴리즈 승격 실패"; exit 1 }
          Write-Host "✓ $tag 를 Latest 로 전환 완료"
